name: Tessera
options:
  bundleIdPrefix: com.abdwy
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "17.0"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "6.0"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

targets:
  Tessera:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - Tessera
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.abdwy.Tessera
        INFOPLIST_FILE: Tessera/Info.plist
        CODE_SIGN_ENTITLEMENTS: Tessera/Tessera.entitlements
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "6.0"
        SWIFT_OBJC_BRIDGING_HEADER: Tessera/Tessera-Bridging-Header.h
        GCC_OPTIMIZATION_LEVEL: "3"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          DEBUG_INFORMATION_FORMAT: dwarf
          ENABLE_TESTABILITY: YES
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

  TesseraTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - TesseraTests
    dependencies:
      - target: Tessera
    settings:
      base:
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Tessera.app/Contents/MacOS/Tessera"
        BUNDLE_LOADER: "$(TEST_HOST)"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""

schemes:
  Tessera:
    build:
      targets:
        Tessera: all
        TesseraTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TesseraTests
